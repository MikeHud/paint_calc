<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jotun Paint Mixing Calculator by weight</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="calculator-container">
      <h2>Jotun Paint Mixing Calculator by weight</h2>

      <div class="selection-row">
        <div class="form-group">
          <label for="paintType">Paint Type:</label>
          <select id="paintType" required>
            <option value="jotamastic-87">Jotamastic 87</option>
            <option value="jotamastic-90">Jotamastic 90</option>
          </select>
        </div>

        <div class="form-group">
          <label>Hardener Type:</label>
          <div class="radio-group">
            <label class="radio-label">
              <input
                type="radio"
                name="hardenerType"
                value="standard"
                checked
              />
              <span class="radio-text">Standard</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="hardenerType" value="winter" />
              <span class="radio-text">Winter Grade</span>
            </label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="totalWeight">Total Weight Needed (grams):</label>
        <input
          type="number"
          id="totalWeight"
          min="1"
          step="1"
          placeholder="Enter total weight"
          required
        />
      </div>

      <button id="calculateBtn" class="calculate-btn">
        Calculate Mixing Ratio
      </button>

      <div id="results" class="results hidden">
        <h3>Mixing Instructions</h3>
        <div class="result-item">
          <span class="label">Base Component:</span>
          <span id="baseWeight" class="value"></span>
        </div>
        <div class="result-item">
          <span class="label">Hardener Component:</span>
          <span id="hardenerWeight" class="value"></span>
        </div>
        <div class="result-item">
          <span class="label">Mixing Ratio:</span>
          <span id="mixingRatio" class="value"></span>
        </div>
      </div>

      <div class="notes">
        <p>– use digital scales accurate to the nearest gram</p>
        <p>– put container on scales and set to zero</p>
        <p>– Measure out base then add hardener to make up total weight</p>
      </div>

      <div id="error" class="error hidden">
        <p id="errorMessage"></p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
